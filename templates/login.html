<!doctype html>
<html lang="pt-BR" class="h-full dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login • Painel de Frota</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    .logo-adjust {
      max-width: 160px;
      max-height: 160px;
      object-fit: contain;
    }

    /* Fundo Desktop */
    .bg-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url("{{ url_for('static', filename='img.png') }}");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
      /* Filtros para melhorar a "pegada" visual */
      filter: brightness(1.05) contrast(1.05);
      image-rendering: -webkit-optimize-contrast;
    }

    /* Ajustes para Mobile */
    @media (max-width: 768px) {
      .bg-container {
        background-image: url("{{ url_for('static', filename='imgmbl.png') }}");
        background-size: 100% 100%;
        filter: brightness(1.0) contrast(1.1);
      }
      
      .login-card {
        max-width: 90% !important;
        margin: 0 auto;
      }
    }

    /* Camada de escurecimento */
    .bg-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.15);
      z-index: 1;
      pointer-events: none;
    }
  </style>
</head>

<body class="h-full flex items-end md:items-center justify-center md:justify-end px-6 md:px-0 md:pr-32 pb-32 md:pb-0
             relative overflow-hidden 
             text-gray-100">

  <!-- DIV DE FUNDO COM FILTROS -->
  <div class="bg-container"></div>
  <div class="bg-overlay"></div>

  <!-- CARD GLASS -->
  <form method="post"
        class="login-card relative z-10 w-full max-w-sm backdrop-blur-md
               bg-black/60 
               border border-white/10 
               rounded-2xl shadow-2xl p-8 md:p-10">

    <!-- LOGO -->
    <div class="w-full flex justify-center mb-4">
      <img src="{{ url_for('static', filename='logo.png') }}" 
           alt="Logo"
           class="logo-adjust opacity-95 drop-shadow-lg">
    </div>

    <!-- TÍTULO -->
    <h1 class="text-xl text-center font-bold 
               text-white/90 
               mb-6 tracking-wide">
      <i class="fa-solid fa-user-shield 
                text-emerald-400 mr-2"></i>
      Acesso ao Sistema
    </h1>

    <!-- USUÁRIO -->
    <div class="mb-5">
      <label class="text-xs font-medium text-emerald-200 uppercase tracking-wider">
        Usuário
      </label>

      <div class="flex items-center mt-1 
                  bg-white/5 
                  border border-white/10 
                  backdrop-blur rounded-xl px-4 py-2.5 shadow-lg">
        <i class="fa-solid fa-user 
                  text-emerald-300 mr-3 text-sm"></i>

        <input name="username"
               class="bg-transparent w-full 
                      text-white text-sm
                      placeholder-gray-400 
                      focus:outline-none"
               placeholder="Digite seu usuário" required>
      </div>
    </div>

    <!-- SENHA -->
    <div class="mb-8">
      <label class="text-xs font-medium text-emerald-200 uppercase tracking-wider">
        Senha
      </label>

      <div class="flex items-center mt-1 
                  bg-white/5 
                  border border-white/10 
                  backdrop-blur rounded-xl px-4 py-2.5 shadow-lg">
        <i class="fa-solid fa-lock 
                  text-emerald-300 mr-3 text-sm"></i>

        <input type="password" name="password"
               class="bg-transparent w-full 
                      text-white text-sm
                      placeholder-gray-400
                      focus:outline-none"
               placeholder="Digite sua senha" required>
      </div>
    </div>

    <!-- BOTÃO -->
    <button class="w-full py-3 rounded-xl font-semibold text-base
                   bg-emerald-600 hover:bg-emerald-700 text-white 
                   shadow-xl shadow-emerald-600/20
                   transition-all duration-300 transform 
                   hover:-translate-y-[1px] active:scale-95">
      Entrar
    </button>

    <!-- ERROS -->
    {% with msgs = get_flashed_messages(category_filter=["login_error"]) %}
      {% if msgs %}
        {% for msg in msgs %}
          <p class="text-red-400 text-center mt-4 text-sm font-semibold">
            {{ msg }}
          </p>
        {% endfor %}
      {% endif %}
    {% endwith %}

  </form>

</body>
</html>
