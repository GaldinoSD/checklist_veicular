
{% extends "layout.html" %}
{% set page_title = "Mapa ao Vivo" %}
{% set hide_header = true %}

{% block content %}
<style>
    /* Estilos do HUD Flutuante */
    #control-hud {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
    }
    
    #control-hud.collapsed {
        opacity: 0;
        pointer-events: none;
    }
</style>

<div class="flex flex-col h-full w-full overflow-hidden animate-premium relative">
    
    <!-- ✅ ÁREA DO MAPA E HUD FLUTUANTE -->
    <div class="flex-1 relative lg:m-4 lg:rounded-[2.5rem] overflow-hidden shadow-2xl border-none lg:border border-slate-900/5 dark:border-white/5 bg-white dark:bg-slate-950">
        
        <!-- LEAFLET MAP -->
        <div id="map" class="absolute inset-0 z-0"></div>

        <!-- CENTRAL DE ALERTAS FLUTUANTE (Bottom Right) -->
        <div id="alerts-hud" class="absolute bottom-4 right-4 z-[999] w-80 max-h-56 glass-premium rounded-[2.2rem] shadow-2xl border border-red-500/20 overflow-hidden flex flex-col transition-all duration-300 transform">
            <div class="p-3 bg-red-500/10 border-b border-red-500/20 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-2 text-red-500">
                    <i class="fa-solid fa-triangle-exclamation text-xs animate-bounce"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Incidentes Telemetria</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="alerts-count-badge" class="px-2 py-0.5 rounded-full bg-red-500 text-white text-[8px] font-black">0</span>
                    <button onclick="toggleAlertsPanel()" class="w-8 h-8 rounded-xl hover:bg-red-500/10 text-red-500 transition-all flex items-center justify-center active:scale-95">
                        <i id="alerts-chevron" class="fa-solid fa-chevron-down text-xs transition-transform duration-300"></i>
                    </button>
                </div>
            </div>
            <div id="alerts-list" class="flex-1 overflow-y-auto p-3 space-y-1.5 custom-scrollbar text-[9px] min-h-[50px] bg-slate-50/50 dark:bg-slate-900/50">
                <div class="text-center py-6 opacity-30 text-slate-400">
                    <p class="text-[8px] font-black uppercase">Nenhum incidente crítico</p>
                </div>
            </div>
        </div>

        <!-- CONTROLES FLUTUANTES SUPERIORES ESQUERDOS -->
        <div class="absolute top-4 left-4 z-[999] flex gap-2">
            <!-- Botão Menu Hambúrguer para Sidebar (Apenas Mobile/Tablet) -->
            <button id="btn-menu-sidebar" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')" 
                    class="lg:hidden w-12 h-12 rounded-2xl bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border border-slate-900/10 dark:border-white/10 shadow-2xl flex items-center justify-center text-slate-700 dark:text-white hover:scale-105 active:scale-95 transition-all duration-300">
                <i class="fa-solid fa-bars text-sm"></i>
            </button>

            <!-- BOTÃO DE EXPANDIR O PAINEL (Aparece quando colapsado) -->
            <button id="btn-expand-hud" onclick="toggleControlPanel(true)" 
                    class="hidden w-12 h-12 rounded-2xl bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border border-slate-900/10 dark:border-white/10 shadow-2xl flex items-center justify-center text-slate-700 dark:text-white hover:scale-105 active:scale-95 transition-all duration-300">
                <i class="fa-solid fa-satellite-dish text-sm"></i>
            </button>
        </div>

        <!-- FILTROS FLUTUANTES (Top Center) -->
        <div class="absolute top-4 left-1/2 -translate-x-1/2 z-[999] flex gap-1.5 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md p-1.5 rounded-2xl border border-slate-900/10 dark:border-white/10 shadow-2xl shrink-0 max-w-[calc(100vw-8rem)] overflow-x-auto custom-scrollbar">
            <button onclick="setFilter('all')" id="filter-all" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-blue-600 text-white shadow-lg shadow-blue-500/20 shrink-0">Todos (<span id="btn-count-all">0</span>)</button>
            <button onclick="setFilter('moving')" id="filter-moving" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-transparent text-slate-500 dark:text-slate-400 shrink-0">Movimento (<span id="btn-count-moving">0</span>)</button>
            <button onclick="setFilter('offline')" id="filter-offline" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-transparent text-slate-500 dark:text-slate-400 shrink-0">Offline (<span id="btn-count-offline">0</span>)</button>
        </div>

        <!-- HUD FLUTUANTE DE CONTROLE -->
        <div id="control-hud" class="absolute top-4 left-4 z-[999] w-80 max-h-[calc(100%-2rem)] max-w-[calc(100vw-2rem)] flex flex-col glass-premium rounded-[2.2rem] shadow-2xl border border-slate-900/10 dark:border-white/10 overflow-hidden transition-all duration-500 ease-out transform">
            
            <!-- 1. Cabeçalho do HUD -->
            <div class="p-4 border-b border-slate-900/5 dark:border-white/5 flex items-center justify-between bg-slate-50/50 dark:bg-white/5 shrink-0">
                <div class="flex items-center gap-2">
                    <!-- Hamburger para abrir a sidebar a partir do HUD (Mobile) -->
                    <button onclick="document.getElementById('sidebar').classList.toggle('mobile-open')" class="lg:hidden w-8 h-8 rounded-lg hover:bg-slate-900/5 dark:hover:bg-white/5 text-slate-500 hover:text-slate-800 dark:hover:text-white flex items-center justify-center active:scale-95 transition-all">
                        <i class="fa-solid fa-bars text-sm"></i>
                    </button>
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-[10px] font-black text-slate-700 dark:text-white uppercase tracking-widest">Painel Operacional</span>
                </div>
                <button onclick="toggleControlPanel(false)" class="w-8 h-8 rounded-xl hover:bg-slate-900/5 dark:hover:bg-white/5 text-slate-400 hover:text-slate-600 dark:hover:text-white transition-all flex items-center justify-center active:scale-95">
                    <i class="fa-solid fa-chevron-left text-xs"></i>
                </button>
            </div>

            <!-- 2. Busca e Lista de Veículos -->
            <div class="p-4 flex flex-col flex-1 overflow-hidden min-h-0">
                <div class="relative mb-3 shrink-0">
                    <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-[10px]"></i>
                    <input type="text" id="searchVehicle" placeholder="Buscar placa ou técnico..." 
                           class="w-full bg-slate-900/5 dark:bg-white/5 rounded-xl pl-9 pr-4 py-2 text-[11px] font-bold outline-none focus:ring-2 focus:ring-blue-500 transition-all border border-slate-900/5 dark:border-white/5 text-slate-800 dark:text-white">
                </div>
                
                <!-- Lista de veículos -->
                <div id="vehicle-list" class="flex-1 overflow-y-auto space-y-1.5 pr-1 custom-scrollbar min-h-0">
                    <div class="text-center py-10 opacity-30">
                        <p class="text-[9px] font-black uppercase">Carregando frota...</p>
                    </div>
                </div>
            </div>

            <!-- 3. Accordion Feed de Eventos -->
            <div class="border-t border-slate-900/5 dark:border-white/5 bg-slate-50/20 dark:bg-white/5 shrink-0 flex flex-col">
                <button onclick="toggleEventFeed()" class="w-full p-4 flex items-center justify-between text-slate-500 hover:text-slate-700 dark:hover:text-white transition-colors">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-bolt-lightning text-amber-500 text-xs"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">Eventos Recentes</span>
                    </div>
                    <i id="event-chevron" class="fa-solid fa-chevron-down text-[8px] transition-transform duration-300"></i>
                </button>
                
                <!-- Conteúdo Colapsável -->
                <div id="event-feed-container" class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out">
                    <div class="p-4 pt-0">
                        <div id="event-feed" class="max-h-36 overflow-y-auto pr-1 space-y-2 custom-scrollbar text-[9px] min-h-[60px]">
                            <div class="text-center py-4 opacity-30">
                                <p class="text-[9px] font-black uppercase">Sem eventos recentes</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map;
    let markers = {};
    let geofenceCircles = {};
    let vehiclesData = [];
    let currentFilter = 'all';

    function initMap() {
        map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([-22.7686, -43.7061], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        
        fetchData();
        fetchAlerts();
        tickSimulator();
        
        setInterval(fetchData, 4000);
        setInterval(fetchAlerts, 4000);
        setInterval(tickSimulator, 12000);
    }

    async function tickSimulator() {
        try {
            const res = await fetch('/api/gps/simulator/tick', { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                console.log("Simulador Tick:", data.message);
                fetchData();
                fetchAlerts();
            }
        } catch (e) {
            console.error("Erro no tick do simulador:", e);
        }
    }

    async function fetchData() {
        try {
            const res = await fetch('/api/gps/current');
            const data = await res.json();
            vehiclesData = data.vehicles;
            renderVehicleList();
            updateMarkers();
            updateStats();
            loadActiveGeofences();
        } catch (e) {
            console.error("Erro ao buscar GPS:", e);
        }
    }

    async function fetchAlerts() {
        try {
            const res = await fetch('/api/gps/alerts');
            const data = await res.json();
            if (data.success) {
                renderAlerts(data.alerts);
            }
        } catch (e) {
            console.error("Erro ao buscar alertas:", e);
        }
    }

    function renderAlerts(alerts) {
        const list = document.getElementById('alerts-list');
        const badge = document.getElementById('alerts-count-badge');
        badge.textContent = alerts.length;

        if (alerts.length === 0) {
            list.innerHTML = `
                <div class="text-center py-6 opacity-30 text-slate-400">
                    <p class="text-[8px] font-black uppercase">Nenhum incidente crítico</p>
                </div>
            `;
            return;
        }

        list.innerHTML = alerts.map(a => `
            <div class="p-2 rounded-xl bg-red-500/5 dark:bg-red-500/10 border border-red-500/10 dark:border-red-500/20 flex flex-col gap-1">
                <div class="flex justify-between items-center">
                    <span class="text-[7.5px] font-black text-red-500 uppercase tracking-tighter">${a.alert_type}</span>
                    <span class="text-[7px] text-slate-400 font-bold">${a.timestamp}</span>
                </div>
                <p class="text-[8.5px] font-bold text-slate-700 dark:text-slate-200">${a.description}</p>
                <div class="flex justify-between items-center mt-1">
                    <span class="text-[7.5px] font-black text-slate-400 uppercase">Veículo: ${a.vehicle_plate}</span>
                    <button onclick="dismissAlert(${a.id})" class="px-2 py-0.5 rounded bg-red-500 hover:bg-red-600 text-white text-[7.5px] font-black uppercase">Resolver</button>
                </div>
            </div>
        `).join('');
    }

    async function dismissAlert(id) {
        try {
            const res = await fetch(`/api/gps/alerts/dismiss/${id}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                showToast('Alerta resolvido!', 'success');
                fetchAlerts();
            }
        } catch(e) {
            showToast('Erro ao resolver alerta.', 'error');
        }
    }

    async function setupGeofence(vehicleId, defaultLat, defaultLon) {
        const radius = prompt("Definir Cerca Virtual circular.\nInsira o raio de proteção em metros (ex: 500 para 500m):", "500");
        if (!radius) return;

        try {
            const res = await fetch('/api/gps/geofence', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    vehicle_id: vehicleId,
                    lat: defaultLat,
                    lon: defaultLon,
                    radius: parseFloat(radius),
                    is_active: true
                })
            });
            const result = await res.json();
            if (result.success) {
                showToast(result.message, 'success');
                drawGeofenceOnMap(vehicleId, defaultLat, defaultLon, parseFloat(radius));
            } else {
                showToast(result.error || 'Erro ao configurar cerca.', 'error');
            }
        } catch (e) {
            showToast('Erro ao salvar cerca virtual.', 'error');
        }
    }

    function drawGeofenceOnMap(vehicleId, lat, lon, radius) {
        if (geofenceCircles[vehicleId]) {
            geofenceCircles[vehicleId].remove();
        }
        geofenceCircles[vehicleId] = L.circle([lat, lon], {
            color: '#ef4444',
            fillColor: '#ef4444',
            fillOpacity: 0.1,
            radius: radius,
            dashArray: '5, 8'
        }).addTo(map);
    }

    async function loadActiveGeofences() {
        vehiclesData.forEach(async (v) => {
            if (!v.lat || !v.lon) return;
            try {
                const res = await fetch(`/api/gps/geofence?vehicle_id=${v.id}`);
                const result = await res.json();
                if (result.success && result.is_active) {
                    drawGeofenceOnMap(v.id, result.lat, result.lon, result.radius);
                }
            } catch (e) {}
        });
    }

    function renderVehicleList() {
        const list = document.getElementById('vehicle-list');
        const search = document.getElementById('searchVehicle').value.toLowerCase();
        
        const filtered = vehiclesData
            .filter(v => (v.plate.toLowerCase().includes(search) || v.technician.toLowerCase().includes(search)))
            .filter(v => {
                if(currentFilter === 'moving') return v.is_online && v.speed > 5;
                if(currentFilter === 'offline') return !v.is_online;
                return true;
            });

        if (filtered.length === 0) {
            list.innerHTML = `<div class="text-center py-10 opacity-30 text-[9px] font-black uppercase text-slate-400">Nenhum veículo</div>`;
            return;
        }

        list.innerHTML = filtered.map(v => `
            <div onclick="focusVehicle(${v.id})" 
                 class="p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-900/5 dark:border-white/5 hover:border-blue-500/30 dark:hover:border-blue-500/30 transition-all cursor-pointer group hover:scale-[1.01] hover:shadow-md">
                <div class="flex items-center justify-between mb-0.5">
                    <span class="text-[10px] font-black text-slate-800 dark:text-white uppercase tracking-tight">${v.plate}</span>
                    <div class="flex items-center gap-1">
                        <span class="text-[7.5px] font-black ${v.is_online ? 'text-emerald-500' : 'text-slate-400'} uppercase tracking-wider">${v.is_online ? 'Online' : 'Offline'}</span>
                        <span class="w-1.5 h-1.5 rounded-full ${v.is_online ? 'bg-emerald-500 animate-pulse' : 'bg-slate-400'}"></span>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-[8px] font-black text-slate-400 dark:text-slate-500 uppercase truncate max-w-[120px]">${v.model}</span>
                    <span class="text-[9px] font-black ${v.speed > 5 ? 'text-teal-500' : 'text-slate-500'}">${Math.round(v.speed)} KM/H</span>
                </div>
            </div>
        `).join('');
    }

    function updateMarkers() {
        vehiclesData.forEach(v => {
            if (!v.lat || !v.lon) return;

            const isVisible = currentFilter === 'all' || 
                             (currentFilter === 'moving' && v.is_online && v.speed > 5) ||
                             (currentFilter === 'offline' && !v.is_online);

            if(!isVisible) {
                if(markers[v.id]) markers[v.id].remove();
                return;
            }

            const color = v.is_online ? (v.map_color || '#10b981') : '#94a3b8';
            const iconClass = v.map_icon || 'fa-location-arrow';
            const shouldRotate = iconClass === 'fa-location-arrow' || iconClass === 'fa-arrow-up' || iconClass === 'fa-navigation';
            const rotation = shouldRotate ? `transform: rotate(${v.angle}deg)` : '';

            const icon = L.divIcon({
                className: 'custom-marker',
                html: `
                    <div class="relative flex flex-col items-center">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-white shadow-xl transition-all duration-500" 
                             style="background: ${color}; ${rotation}">
                            <i class="fa-solid ${iconClass}"></i>
                        </div>
                        ${v.is_online ? '<div class="absolute top-0 right-0 w-3.5 h-3.5 bg-emerald-500 border-2 border-white dark:border-slate-900 rounded-full"></div>' : ''}
                        <!-- Placa do Veículo -->
                        <div class="absolute -bottom-5 bg-slate-900/90 text-white text-[8px] font-black uppercase tracking-wider py-0.5 px-1.5 rounded-lg shadow-lg border border-white/10 whitespace-nowrap">
                            ${v.plate}
                        </div>
                    </div>
                `,
                iconSize: [40, 55],
                iconAnchor: [20, 20]
            });

            const popupContent = `
                <div class="p-2.5 min-w-[150px] space-y-1">
                    <h4 class="font-black text-slate-800 uppercase tracking-tight">${v.plate}</h4>
                    <p class="text-[9px] text-slate-500 uppercase font-black tracking-widest">${v.model}</p>
                    <div class="text-[10px] font-bold text-teal-600">${Math.round(v.speed)} KM/H - ${v.ignition ? 'Ignição Ligada' : 'Ignição Desligada'}</div>
                    <button onclick="setupGeofence(${v.id}, ${v.lat}, ${v.lon})" class="w-full mt-2 btn-premium bg-teal-600 hover:bg-teal-700 text-white py-1.5 rounded-xl text-[8px] font-black uppercase tracking-wider transition-all">Configurar Cerca</button>
                </div>
            `;

            if (markers[v.id]) {
                markers[v.id].addTo(map);
                markers[v.id].setLatLng([v.lat, v.lon]);
                markers[v.id].setIcon(icon);
                markers[v.id].setPopupContent(popupContent);
            } else {
                markers[v.id] = L.marker([v.lat, v.lon], { icon: icon }).addTo(map)
                    .bindPopup(popupContent);
            }
        });
    }

    function updateStats() {
        let moving = 0;
        let offline = 0;
        const total = vehiclesData.length;
        const eventFeed = document.getElementById('event-feed');
        
        const hasPlaceholder = eventFeed.querySelector('.opacity-30');
        
        vehiclesData.forEach(v => {
            if (v.is_online && v.speed > 5) moving++;
            if (!v.is_online) offline++;
            
            if (v.is_online && !v.was_online) {
                if (hasPlaceholder) eventFeed.innerHTML = '';
                
                const event = document.createElement('div');
                event.className = 'p-2 rounded-xl bg-teal-500/5 dark:bg-teal-500/10 border border-teal-500/10 dark:border-teal-500/20 mb-1.5 transition-all duration-300';
                event.innerHTML = `
                    <div class="flex justify-between items-center mb-0.5">
                        <span class="text-[7.5px] font-black text-teal-600 dark:text-teal-400 uppercase tracking-tighter">Sinal GPS</span>
                        <span class="text-[7.5px] font-bold text-slate-400">${new Date().toLocaleTimeString('pt-BR')}</span>
                    </div>
                    <p class="text-[9.5px] font-black text-slate-700 dark:text-slate-200 uppercase">${v.plate} - Conectado</p>
                `;
                if(eventFeed.children.length > 10) eventFeed.lastElementChild.remove();
                eventFeed.prepend(event);
            }
            v.was_online = v.is_online;
        });

        document.getElementById('btn-count-all').textContent = total;
        document.getElementById('btn-count-moving').textContent = moving;
        document.getElementById('btn-count-offline').textContent = offline;
    }

    function focusVehicle(id) {
        const v = vehiclesData.find(v => v.id === id);
        if (v && v.lat && v.lon) {
            map.flyTo([v.lat, v.lon], 16);
            if (markers[id]) markers[id].openPopup();
        }
    }

    function setFilter(f) {
        currentFilter = f;
        ['all', 'moving', 'offline'].forEach(i => {
            const btn = document.getElementById(`filter-${i}`);
            if(i === f) {
                btn.classList.add('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-500/20');
                btn.classList.remove('bg-slate-900/5', 'dark:bg-white/5', 'text-slate-500');
            } else {
                btn.classList.remove('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-500/20');
                btn.classList.add('bg-slate-900/5', 'dark:bg-white/5', 'text-slate-500');
            }
        });
        renderVehicleList();
        updateMarkers();
    }

    function toggleControlPanel(show) {
        const hud = document.getElementById('control-hud');
        const expandBtn = document.getElementById('btn-expand-hud');
        if (show) {
            hud.classList.remove('collapsed', '-translate-x-[110%]');
            expandBtn.classList.add('hidden');
        } else {
            hud.classList.add('collapsed', '-translate-x-[110%]');
            setTimeout(() => {
                expandBtn.classList.remove('hidden');
            }, 300);
        }
    }

    function toggleEventFeed() {
        const container = document.getElementById('event-feed-container');
        const chevron = document.getElementById('event-chevron');
        if (container.classList.contains('max-h-0')) {
            container.classList.remove('max-h-0');
            container.classList.add('max-h-48');
            chevron.classList.add('rotate-180');
        } else {
            container.classList.remove('max-h-48');
            container.classList.add('max-h-0');
            chevron.classList.remove('rotate-180');
        }
    }

    function toggleAlertsPanel() {
        const alertsList = document.getElementById('alerts-list');
        const chevron = document.getElementById('alerts-chevron');
        const hud = document.getElementById('alerts-hud');
        
        if (alertsList.classList.contains('hidden')) {
            alertsList.classList.remove('hidden');
            chevron.classList.remove('rotate-180');
            hud.classList.remove('max-h-[50px]');
            hud.classList.add('max-h-56');
        } else {
            alertsList.classList.add('hidden');
            chevron.classList.add('rotate-180');
            hud.classList.remove('max-h-56');
            hud.classList.add('max-h-[50px]');
        }
    }

    document.getElementById('searchVehicle').addEventListener('input', renderVehicleList);
    window.onload = initMap;
</script>
{% endblock %}
