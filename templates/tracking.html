
{% extends "layout.html" %}
{% set page_title = "Mapa ao Vivo" %}

{% block content %}
<div class="flex flex-col h-[calc(100vh-2rem)] overflow-hidden animate-premium">
    
    <!-- ✅ HEADER OPERACIONAL -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 glass-premium p-6 rounded-[2.5rem] shadow-xl overflow-hidden relative mb-6">
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-blue-500/10 rounded-full blur-3xl"></div>
        <div class="flex items-center gap-6 relative z-10">
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center text-white shadow-2xl">
                <i class="fa-solid fa-map-location-dot text-xl"></i>
            </div>
            <div>
                <nav class="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">
                    <span>Monitoramento</span>
                    <i class="fa-solid fa-chevron-right text-[8px] opacity-30"></i>
                    <span class="text-blue-500">Frota em Tempo Real</span>
                </nav>
                <h2 class="text-2xl font-black text-slate-800 dark:text-white tracking-tight">Mapa de Operações</h2>
            </div>
        </div>

        <div class="flex items-center gap-2 relative z-10">
            <button onclick="setFilter('all')" id="filter-all" class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-blue-600 text-white shadow-lg shadow-blue-500/20">Todos</button>
            <button onclick="setFilter('moving')" id="filter-moving" class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-slate-900/5 dark:bg-white/5 text-slate-500">Em Movimento</button>
            <button onclick="setFilter('offline')" id="filter-offline" class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-slate-900/5 dark:bg-white/5 text-slate-500">Offline</button>
        </div>
    </div>

    <!-- ✅ MAPA E BARRA LATERAL -->
    <div class="flex flex-1 gap-6 overflow-hidden">
        
        <!-- ✅ SIDEBAR DE CONTROLE -->
        <div class="w-80 flex flex-col gap-6 overflow-hidden">
            <!-- 1. Estatísticas -->
            <div class="grid grid-cols-2 gap-4">
                <div class="card-premium p-4 flex flex-col items-center justify-center text-center">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Em Movimento</span>
                    <span id="stat-moving" class="text-xl font-black text-emerald-500">0</span>
                </div>
                <div class="card-premium p-4 flex flex-col items-center justify-center text-center">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Offline</span>
                    <span id="stat-offline" class="text-xl font-black text-slate-400">0</span>
                </div>
            </div>

            <!-- 2. Busca e Lista de Veículos -->
            <div class="flex-[1.5] glass-premium rounded-[2.5rem] border border-slate-900/5 dark:border-white/5 p-6 overflow-hidden flex flex-col">
                <div class="relative mb-4">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[10px]"></i>
                    <input type="text" id="searchVehicle" placeholder="Buscar placa ou técnico..." 
                           class="w-full bg-slate-900/5 dark:bg-white/5 rounded-xl pl-9 pr-4 py-2.5 text-[11px] font-bold outline-none focus:ring-2 focus:ring-blue-500 transition-all border border-slate-900/5 dark:border-white/5">
                </div>
                
                <div id="vehicle-list" class="flex-1 overflow-y-auto space-y-2 pr-1 custom-scrollbar">
                    <div class="text-center py-10 opacity-30">
                        <p class="text-[9px] font-black uppercase">Carregando frota...</p>
                    </div>
                </div>
            </div>

            <!-- 3. Feed de Eventos -->
            <div class="flex-1 glass-premium rounded-[2.5rem] border border-slate-900/5 dark:border-white/5 p-6 overflow-hidden flex flex-col">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-bolt-lightning text-amber-500"></i>
                    Eventos da Frota
                </h3>
                <div id="event-feed" class="flex-1 overflow-y-auto pr-2 space-y-3 custom-scrollbar text-[10px]">
                    <div class="text-center py-10 opacity-30">
                        <p class="text-[9px] font-black uppercase">Monitorando...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ✅ ÁREA DO MAPA (LIMPA) -->
        <div class="flex-1 relative rounded-[2.5rem] overflow-hidden shadow-2xl border border-slate-900/5 dark:border-white/5">
            <div id="map" class="absolute inset-0 z-0"></div>
        </div>
    </div>
</div>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map;
    let markers = {};
    let vehiclesData = [];
    let currentFilter = 'all';

    function initMap() {
        map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([-22.75, -43.70], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        fetchData();
        setInterval(fetchData, 5000);
    }

    async function fetchData() {
        try {
            const res = await fetch('/api/gps/current');
            const data = await res.json();
            vehiclesData = data.vehicles;
            renderVehicleList();
            updateMarkers();
            updateStats();
        } catch (e) {
            console.error("Erro ao buscar GPS:", e);
        }
    }

    function renderVehicleList() {
        const list = document.getElementById('vehicle-list');
        const search = document.getElementById('searchVehicle').value.toLowerCase();
        
        const filtered = vehiclesData
            .filter(v => (v.plate.toLowerCase().includes(search) || v.technician.toLowerCase().includes(search)))
            .filter(v => {
                if(currentFilter === 'moving') return v.is_online && v.speed > 5;
                if(currentFilter === 'offline') return !v.is_online;
                return true;
            });

        if (filtered.length === 0) {
            list.innerHTML = `<div class="text-center py-10 opacity-30 text-[9px] font-black uppercase">Nenhum veículo encontrado</div>`;
            return;
        }

        list.innerHTML = filtered.map(v => `
            <div onclick="focusVehicle(${v.id})" class="p-3 rounded-2xl bg-white dark:bg-white/5 border border-slate-900/5 dark:border-white/5 hover:border-blue-500/30 transition-all cursor-pointer group">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-[11px] font-black text-slate-800 dark:text-white">${v.plate}</span>
                    <div class="flex items-center gap-1.5">
                        <span class="text-[8px] font-black ${v.is_online ? 'text-emerald-500' : 'text-slate-400'} uppercase">${v.is_online ? 'Online' : 'Offline'}</span>
                        <span class="w-2 h-2 rounded-full ${v.is_online ? 'bg-emerald-500 animate-pulse' : 'bg-slate-400'}"></span>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-[9px] font-bold text-slate-400 uppercase truncate pr-2">${v.model}</span>
                    <span class="text-[10px] font-black ${v.speed > 5 ? 'text-teal-500' : 'text-slate-500'}">${Math.round(v.speed)} KM/H</span>
                </div>
            </div>
        `).join('');
    }

    function updateMarkers() {
        vehiclesData.forEach(v => {
            if (!v.lat || !v.lon) return;

            const isVisible = currentFilter === 'all' || 
                             (currentFilter === 'moving' && v.is_online && v.speed > 5) ||
                             (currentFilter === 'offline' && !v.is_online);

            if(!isVisible) {
                if(markers[v.id]) markers[v.id].remove();
                return;
            }

            const color = v.is_online ? (v.speed > 5 ? '#10b981' : '#f59e0b') : '#94a3b8';
            const icon = L.divIcon({
                className: 'custom-marker',
                html: `
                    <div class="relative">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-white shadow-xl transition-all duration-500" 
                             style="background: ${color}; transform: rotate(${v.angle}deg)">
                            <i class="fa-solid fa-location-arrow"></i>
                        </div>
                        ${v.is_online ? '<div class="absolute -top-1 -right-1 w-3.5 h-3.5 bg-emerald-500 border-2 border-white dark:border-slate-900 rounded-full"></div>' : ''}
                    </div>
                `,
                iconSize: [40, 40],
                iconAnchor: [20, 20]
            });

            if (markers[v.id]) {
                markers[v.id].addTo(map);
                markers[v.id].setLatLng([v.lat, v.lon]);
                markers[v.id].setIcon(icon);
            } else {
                markers[v.id] = L.marker([v.lat, v.lon], { icon: icon }).addTo(map)
                    .bindPopup(`<div class="p-2 min-w-[120px]">
                        <h4 class="font-black text-slate-800">${v.plate}</h4>
                        <p class="text-[10px] text-slate-500 uppercase">${v.model}</p>
                        <div class="mt-2 text-[10px] font-bold text-teal-600">${Math.round(v.speed)} KM/H</div>
                    </div>`);
            }
        });
    }

    function updateStats() {
        let moving = 0;
        let offline = 0;
        const eventFeed = document.getElementById('event-feed');
        
        vehiclesData.forEach(v => {
            if (v.is_online && v.speed > 5) moving++;
            if (!v.is_online) offline++;
            
            // Simulação de Evento de Conexão
            if (v.is_online && !v.was_online) {
                const event = document.createElement('div');
                event.className = 'p-3 rounded-2xl bg-teal-500/5 border border-teal-500/10 animate-premium mb-2';
                event.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[8px] font-black text-teal-600 uppercase tracking-tighter">Sinal GPS Recebido</span>
                        <span class="text-[8px] font-bold text-slate-400">${new Date().toLocaleTimeString()}</span>
                    </div>
                    <p class="text-[10px] font-black text-slate-700 dark:text-white">${v.plate}</p>
                `;
                if(eventFeed.children.length > 10) eventFeed.lastElementChild.remove();
                eventFeed.prepend(event);
            }
            v.was_online = v.is_online;
        });

        document.getElementById('stat-moving').textContent = moving;
        document.getElementById('stat-offline').textContent = offline;
    }

    function focusVehicle(id) {
        const v = vehiclesData.find(v => v.id === id);
        if (v && v.lat && v.lon) {
            map.flyTo([v.lat, v.lon], 16);
            if (markers[id]) markers[id].openPopup();
        }
    }

    function setFilter(f) {
        currentFilter = f;
        ['all', 'moving', 'offline'].forEach(i => {
            const btn = document.getElementById(`filter-${i}`);
            if(i === f) {
                btn.classList.add('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-500/20');
                btn.classList.remove('bg-slate-900/5', 'dark:bg-white/5', 'text-slate-500');
            } else {
                btn.classList.remove('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-500/20');
                btn.classList.add('bg-slate-900/5', 'dark:bg-white/5', 'text-slate-500');
            }
        });
        renderVehicleList();
        updateMarkers();
    }

    document.getElementById('searchVehicle').addEventListener('input', renderVehicleList);
    window.onload = initMap;
</script>
{% endblock %}
