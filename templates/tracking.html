
{% extends "layout.html" %}
{% set page_title = "Mapa ao Vivo" %}
{% set hide_header = true %}

{% block content %}
<style>
    /* Estilos do HUD Flutuante */
    #control-hud {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
    }
    
    #control-hud.collapsed {
        opacity: 0;
        pointer-events: none;
    }

    /* ===== PREMIUM VEHICLE MARKER ===== */
    .custom-marker {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
    }

    .marker-card {
        position: relative;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px 6px 6px;
        border-radius: 20px;
        color: #fff;
        font-family: 'Outfit', sans-serif;
        white-space: nowrap;
        transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), box-shadow 0.3s ease;
        cursor: pointer;
        min-width: 130px;
    }
    .marker-card:hover {
        transform: scale(1.08);
    }

    /* Circular icon container */
    .marker-icon-circle {
        width: 32px;
        height: 32px;
        min-width: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        transition: transform 0.5s ease;
    }

    /* Text section */
    .marker-text {
        display: flex;
        flex-direction: column;
        line-height: 1.15;
    }
    .marker-plate {
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }
    .marker-driver {
        font-size: 9px;
        font-weight: 600;
        opacity: 0.8;
        max-width: 90px;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* Status badge (top-left floating) */
    .marker-status-badge {
        position: absolute;
        top: -5px;
        left: -3px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
        border: 2px solid #fff;
        z-index: 2;
    }
    .marker-status-badge.online {
        background: #10b981;
        animation: pulse-badge 2s infinite;
    }
    .marker-status-badge.offline {
        background: #94a3b8;
    }

    @keyframes pulse-badge {
        0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
        50% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
    }

    /* Triangle pointer (bottom center) */
    .marker-pointer {
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-top: 9px solid #334155;
    }

    /* Speed pill (right edge) */
    .marker-speed {
        position: absolute;
        top: -4px;
        right: -2px;
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(4px);
        color: #fff;
        font-size: 7.5px;
        font-weight: 800;
        padding: 1px 5px;
        border-radius: 8px;
        letter-spacing: 0.3px;
        border: 1px solid rgba(255,255,255,0.1);
        z-index: 2;
    }

    /* Neon glow animation for moving vehicles */
    @keyframes neon-glow {
        0%, 100% { box-shadow: 0 4px 20px rgba(16, 185, 129, 0.45), 0 0 0 2px rgba(255,255,255,0.12) inset; }
        50% { box-shadow: 0 4px 30px rgba(16, 185, 129, 0.7), 0 0 0 2px rgba(255,255,255,0.18) inset; }
    }
    .marker-card.is-moving {
        animation: neon-glow 2.5s ease-in-out infinite;
    }

    /* ===== PREMIUM LEAFLET POPUP ===== */
    .leaflet-popup-content-wrapper {
        background: #0f172a !important;
        border-radius: 20px !important;
        box-shadow: 0 12px 40px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06) inset !important;
        padding: 0 !important;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.08) !important;
    }
    .leaflet-popup-content {
        margin: 0 !important;
        width: auto !important;
        min-width: 240px;
    }
    .leaflet-popup-tip-container {
        display: block;
    }
    .leaflet-popup-tip {
        background: #0f172a !important;
        box-shadow: none !important;
        border: none !important;
    }
    .leaflet-popup-close-button {
        color: rgba(255,255,255,0.4) !important;
        font-size: 18px !important;
        top: 8px !important;
        right: 10px !important;
        z-index: 10;
        transition: color 0.2s ease;
    }
    .leaflet-popup-close-button:hover {
        color: #fff !important;
    }

    /* Popup internal layout */
    .popup-premium {
        font-family: 'Outfit', sans-serif;
        color: #e2e8f0;
    }
    .popup-header {
        padding: 14px 16px 10px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
    }
    .popup-header-online {
        background: linear-gradient(135deg, rgba(13,148,136,0.15) 0%, rgba(5,150,105,0.08) 100%);
    }
    .popup-header-offline {
        background: linear-gradient(135deg, rgba(71,85,105,0.2) 0%, rgba(51,65,85,0.1) 100%);
    }
    .popup-plate {
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 0.8px;
        color: #fff;
        text-transform: uppercase;
    }
    .popup-model {
        font-size: 9.5px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.3px;
    }
    .popup-status-pill {
        font-size: 8px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 3px 8px;
        border-radius: 10px;
        white-space: nowrap;
    }
    .popup-status-pill.online {
        background: rgba(16,185,129,0.15);
        color: #34d399;
        border: 1px solid rgba(16,185,129,0.25);
    }
    .popup-status-pill.offline {
        background: rgba(148,163,184,0.1);
        color: #94a3b8;
        border: 1px solid rgba(148,163,184,0.2);
    }
    .popup-body {
        padding: 12px 16px;
    }
    .popup-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 0;
        font-size: 11px;
        border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .popup-row:last-child {
        border-bottom: none;
    }
    .popup-row-icon {
        width: 28px;
        height: 28px;
        min-width: 28px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
    }
    .popup-row-label {
        font-size: 9px;
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .popup-row-value {
        font-size: 11px;
        font-weight: 700;
        color: #e2e8f0;
    }
    .popup-footer {
        padding: 0 16px 14px;
    }
    .popup-btn-geofence {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: 100%;
        padding: 9px 0;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #0d9488 0%, #06b6d4 100%);
        color: #fff;
        font-family: 'Outfit', sans-serif;
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.2s ease;
        box-shadow: 0 4px 14px rgba(13,148,136,0.35);
    }
    .popup-btn-geofence:hover {
        transform: scale(1.03);
        box-shadow: 0 6px 20px rgba(13,148,136,0.5);
    }
    .popup-btn-geofence:active {
        transform: scale(0.97);
    }
</style>

    <!-- ✅ ÁREA DO MAPA E HUD FLUTUANTE -->
    <div class="flex-1 relative lg:m-4 lg:rounded-[2.5rem] overflow-hidden shadow-2xl border-none lg:border border-slate-900/5 dark:border-white/5 bg-white dark:bg-slate-950">

        <div class="absolute top-4 left-1/2 -translate-x-1/2 z-[999] flex gap-1.5 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md p-1.5 rounded-2xl border border-slate-900/10 dark:border-white/10 shadow-2xl shrink-0 max-w-[calc(100vw-8rem)] overflow-x-auto custom-scrollbar">
            <button onclick="setFilter('all')" id="filter-all" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-blue-600 text-white shadow-lg shadow-blue-500/20 shrink-0">Todos (<span id="btn-count-all">0</span>)</button>

        <!-- HUD FLUTUANTE DE CONTROLE -->

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map;
    let markers = {};
    let geofenceCircles = {};
    let vehiclesData = [];
    let currentFilter = 'all';

    function initMap() {
        map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([-22.7686, -43.7061], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        
        fetchData();
        fetchAlerts();
        tickSimulator();
        
        setInterval(fetchData, 4000);
        setInterval(fetchAlerts, 4000);
        setInterval(tickSimulator, 12000);
    }

    async function tickSimulator() {
        try {
            const res = await fetch('/api/gps/simulator/tick', { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                console.log("Simulador Tick:", data.message);
                fetchData();
                fetchAlerts();
            }
        } catch (e) {
            console.error("Erro no tick do simulador:", e);
        }
    }

    async function fetchData() {
        try {
            const res = await fetch('/api/gps/current');
            const data = await res.json();
            vehiclesData = data.vehicles;
            renderVehicleList();
            updateMarkers();
            updateStats();
            loadActiveGeofences();
        } catch (e) {
            console.error("Erro ao buscar GPS:", e);
        }
    }

    async function fetchAlerts() {
        try {
            const res = await fetch('/api/gps/alerts');
            const data = await res.json();
            if (data.success) {
                renderAlerts(data.alerts);
            }
        } catch (e) {
            console.error("Erro ao buscar alertas:", e);
        }
    }

    function renderAlerts(alerts) {
        const list = document.getElementById('alerts-list');
        const badge = document.getElementById('alerts-count-badge');
        badge.textContent = alerts.length;

        if (alerts.length === 0) {
            list.innerHTML = `
                <div class="text-center py-6 opacity-30 text-slate-400">
                    <p class="text-[8px] font-black uppercase">Nenhum incidente crítico</p>
                </div>
            `;
            return;
        }

        list.innerHTML = alerts.map(a => `
            <div class="p-2 rounded-xl bg-red-500/5 dark:bg-red-500/10 border border-red-500/10 dark:border-red-500/20 flex flex-col gap-1">
                <div class="flex justify-between items-center">
                    <span class="text-[7.5px] font-black text-red-500 uppercase tracking-tighter">${a.alert_type}</span>
                    <span class="text-[7px] text-slate-400 font-bold">${a.timestamp}</span>
                </div>
                <p class="text-[8.5px] font-bold text-slate-700 dark:text-slate-200">${a.description}</p>
                <div class="flex justify-between items-center mt-1">
                    <span class="text-[7.5px] font-black text-slate-400 uppercase">Veículo: ${a.vehicle_plate}</span>
                    <button onclick="dismissAlert(${a.id})" class="px-2 py-0.5 rounded bg-red-500 hover:bg-red-600 text-white text-[7.5px] font-black uppercase">Resolver</button>
                </div>
            </div>
        `).join('');
    }

    async function dismissAlert(id) {
        try {
            const res = await fetch(`/api/gps/alerts/dismiss/${id}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                showToast('Alerta resolvido!', 'success');
                fetchAlerts();
            }
        } catch(e) {
            showToast('Erro ao resolver alerta.', 'error');
        }
    }

    async function setupGeofence(vehicleId, defaultLat, defaultLon) {
        const radius = prompt("Definir Cerca Virtual circular.\nInsira o raio de proteção em metros (ex: 500 para 500m):", "500");
        if (!radius) return;

        try {
            const res = await fetch('/api/gps/geofence', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    vehicle_id: vehicleId,
                    lat: defaultLat,
                    lon: defaultLon,
                    radius: parseFloat(radius),
                    is_active: true
                })
            });
            const result = await res.json();
            if (result.success) {
                showToast(result.message, 'success');
                drawGeofenceOnMap(vehicleId, defaultLat, defaultLon, parseFloat(radius));
            } else {
                showToast(result.error || 'Erro ao configurar cerca.', 'error');
            }
        } catch (e) {
            showToast('Erro ao salvar cerca virtual.', 'error');
        }
    }

    function drawGeofenceOnMap(vehicleId, lat, lon, radius) {
        if (geofenceCircles[vehicleId]) {
            geofenceCircles[vehicleId].remove();
        }
        geofenceCircles[vehicleId] = L.circle([lat, lon], {
            color: '#ef4444',
            fillColor: '#ef4444',
            fillOpacity: 0.1,
            radius: radius,
            dashArray: '5, 8'
        }).addTo(map);
    }

    async function loadActiveGeofences() {
        vehiclesData.forEach(async (v) => {
            if (!v.lat || !v.lon) return;
            try {
                const res = await fetch(`/api/gps/geofence?vehicle_id=${v.id}`);
                const result = await res.json();
                if (result.success && result.is_active) {
                    drawGeofenceOnMap(v.id, result.lat, result.lon, result.radius);
                }
            } catch (e) {}
        });
    }

    function renderVehicleList() {
        const list = document.getElementById('vehicle-list');
        const search = document.getElementById('searchVehicle').value.toLowerCase();
        
        const filtered = vehiclesData
            .filter(v => (v.plate.toLowerCase().includes(search) || v.technician.toLowerCase().includes(search)))
            .filter(v => {
                if(currentFilter === 'moving') return v.is_online && v.speed > 5;
                if(currentFilter === 'offline') return !v.is_online;
                return true;
            });

        if (filtered.length === 0) {
            list.innerHTML = `<div class="text-center py-10 opacity-30 text-[9px] font-black uppercase text-slate-400">Nenhum veículo</div>`;
            return;
        }

        list.innerHTML = filtered.map(v => `
            <div onclick="focusVehicle(${v.id})" 
                 class="p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-900/5 dark:border-white/5 hover:border-blue-500/30 dark:hover:border-blue-500/30 transition-all cursor-pointer group hover:scale-[1.01] hover:shadow-md">
                <div class="flex items-center justify-between mb-0.5">
                    <span class="text-[10px] font-black text-slate-800 dark:text-white uppercase tracking-tight">${v.plate}</span>
                    <div class="flex items-center gap-1">
                        <span class="text-[7.5px] font-black ${v.is_online ? 'text-emerald-500' : 'text-slate-400'} uppercase tracking-wider">${v.is_online ? 'Online' : 'Offline'}</span>
                        <span class="w-1.5 h-1.5 rounded-full ${v.is_online ? 'bg-emerald-500 animate-pulse' : 'bg-slate-400'}"></span>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-[8px] font-black text-slate-400 dark:text-slate-500 uppercase truncate max-w-[120px]">${v.model}</span>
                    <span class="text-[9px] font-black ${v.speed > 5 ? 'text-teal-500' : 'text-slate-500'}">${Math.round(v.speed)} KM/H</span>
                </div>
            </div>
        `).join('');
    }

    function updateMarkers() {
        vehiclesData.forEach(v => {
            if (!v.lat || !v.lon) return;

            const isVisible = currentFilter === 'all' || 
                             (currentFilter === 'moving' && v.is_online && v.speed > 5) ||
                             (currentFilter === 'offline' && !v.is_online);

            if(!isVisible) {
                if(markers[v.id]) markers[v.id].remove();
                return;
            }

            const iconClass = v.map_icon || 'fa-car';
            const shouldRotate = iconClass === 'fa-location-arrow' || iconClass === 'fa-arrow-up' || iconClass === 'fa-navigation';
            const rotation = shouldRotate ? `transform: rotate(${v.angle}deg)` : '';
            const movingClass = (v.is_online && v.speed > 5) ? 'is-moving' : '';
            const badgeClass = v.is_online ? 'online' : 'offline';
            const speedText = Math.round(v.speed);
            const driverName = v.driver && v.driver !== 'N/A' ? v.driver : '';

            // Suporte a cor personalizada do cadastro de veículos
            const customColor = v.map_color || '#10b981';
            let cardStyle = '';
            let pointerColor = '';
            if (v.is_online) {
                cardStyle = `background: linear-gradient(135deg, ${customColor} 0%, ${customColor}dd 100%); box-shadow: 0 4px 20px ${customColor}73, 0 0 0 2px rgba(255,255,255,0.12) inset;`;
                pointerColor = `border-top-color: ${customColor}dd;`;
            } else {
                cardStyle = 'background: linear-gradient(135deg, #475569 0%, #334155 100%); box-shadow: 0 4px 14px rgba(51,65,85,0.5), 0 0 0 2px rgba(255,255,255,0.06) inset;';
                pointerColor = 'border-top-color: #334155;';
            }

            const icon = L.divIcon({
                className: 'custom-marker',
                html: `
                    <div class="marker-card ${movingClass}" style="${cardStyle}">
                        <!-- Status Badge (top-left) -->
                        <div class="marker-status-badge ${badgeClass}">
                            <i class="fa-solid fa-power-off"></i>
                        </div>
                        <!-- Speed Pill (top-right, only when moving) -->
                        ${v.is_online && v.speed > 2 ? `<div class="marker-speed">${speedText} km/h</div>` : ''}
                        <!-- Circular Icon -->
                        <div class="marker-icon-circle" style="background:${v.is_online ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.15)'}; ${rotation}">
                            <i class="fa-solid ${iconClass}"></i>
                        </div>
                        <!-- Text: Plate + Driver -->
                        <div class="marker-text">
                            <span class="marker-plate">${v.plate}</span>
                            ${driverName ? `<span class="marker-driver">${driverName}</span>` : ''}
                        </div>
                        <!-- Triangle Pointer -->
                        <div class="marker-pointer" style="${pointerColor}"></div>
                    </div>
                `,
                iconSize: [160, 56],
                iconAnchor: [80, 56]
            });

            const ignitionText = v.ignition ? 'Ligada' : 'Desligada';
            const ignitionColor = v.ignition ? '#34d399' : '#f87171';
            const ignitionBg = v.ignition ? 'rgba(16,185,129,0.1)' : 'rgba(248,113,113,0.1)';
            const statusText = v.is_online ? (v.speed > 5 ? 'Em Movimento' : 'Online') : 'Offline';
            const statusClass = v.is_online ? 'online' : 'offline';
            const headerClass = v.is_online ? 'popup-header-online' : 'popup-header-offline';
            const speedColor = v.speed > 80 ? '#f87171' : (v.speed > 5 ? '#2dd4bf' : '#94a3b8');

            const popupContent = `
                <div class="popup-premium">
                    <!-- Header -->
                    <div class="popup-header ${headerClass}">
                        <div>
                            <div class="popup-plate">${v.plate}</div>
                            <div class="popup-model">${v.model}</div>
                        </div>
                        <span class="popup-status-pill ${statusClass}">
                            <i class="fa-solid ${v.is_online ? 'fa-wifi' : 'fa-link-slash'}" style="margin-right:3px;font-size:7px;"></i>
                            ${statusText}
                        </span>
                    </div>

                    <!-- Body -->
                    <div class="popup-body">
                        <!-- Motorista -->
                        <div class="popup-row">
                            <div class="popup-row-icon" style="background:rgba(59,130,246,0.1);color:#60a5fa;"><i class="fa-solid fa-user"></i></div>
                            <div>
                                <div class="popup-row-label">Motorista</div>
                                <div class="popup-row-value">${v.driver}</div>
                            </div>
                        </div>

                        <!-- Velocidade -->
                        <div class="popup-row">
                            <div class="popup-row-icon" style="background:rgba(45,212,191,0.1);color:${speedColor};"><i class="fa-solid fa-gauge-high"></i></div>
                            <div>
                                <div class="popup-row-label">Velocidade</div>
                                <div class="popup-row-value" style="color:${speedColor};">${Math.round(v.speed)} km/h</div>
                            </div>
                        </div>

                        <!-- Ignição -->
                        <div class="popup-row">
                            <div class="popup-row-icon" style="background:${ignitionBg};color:${ignitionColor};"><i class="fa-solid fa-key"></i></div>
                            <div>
                                <div class="popup-row-label">Ignição</div>
                                <div class="popup-row-value" style="color:${ignitionColor};">${ignitionText}</div>
                            </div>
                        </div>

                        <!-- Último Sinal -->
                        <div class="popup-row">
                            <div class="popup-row-icon" style="background:rgba(148,163,184,0.1);color:#94a3b8;"><i class="fa-solid fa-clock"></i></div>
                            <div>
                                <div class="popup-row-label">Último Sinal</div>
                                <div class="popup-row-value">${v.last_time}</div>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="popup-footer">
                        <button onclick="setupGeofence(${v.id}, ${v.lat}, ${v.lon})" class="popup-btn-geofence">
                            <i class="fa-solid fa-circle-nodes"></i> Configurar Cerca Virtual
                        </button>
                    </div>
                </div>
            `;

            if (markers[v.id]) {
                markers[v.id].setLatLng([v.lat, v.lon]);
                markers[v.id].setIcon(icon);
                // Só atualiza conteúdo do popup se ele NÃO estiver aberto (evita flickering)
                if (!markers[v.id].isPopupOpen()) {
                    markers[v.id].setPopupContent(popupContent);
                }
                markers[v.id].addTo(map);
            } else {
                markers[v.id] = L.marker([v.lat, v.lon], { icon: icon }).addTo(map)
                    .bindPopup(popupContent, { maxWidth: 280, minWidth: 240 });
            }
        });
    }

    function updateStats() {
        let moving = 0;
        let offline = 0;
        const total = vehiclesData.length;
        const eventFeed = document.getElementById('event-feed');
        
        const hasPlaceholder = eventFeed.querySelector('.opacity-30');
        
        vehiclesData.forEach(v => {
            if (v.is_online && v.speed > 5) moving++;
            if (!v.is_online) offline++;
            
            if (v.is_online && !v.was_online) {
                if (hasPlaceholder) eventFeed.innerHTML = '';
                
                const event = document.createElement('div');
                event.className = 'p-2 rounded-xl bg-teal-500/5 dark:bg-teal-500/10 border border-teal-500/10 dark:border-teal-500/20 mb-1.5 transition-all duration-300';
                event.innerHTML = `
                    <div class="flex justify-between items-center mb-0.5">
                        <span class="text-[7.5px] font-black text-teal-600 dark:text-teal-400 uppercase tracking-tighter">Sinal GPS</span>
                        <span class="text-[7.5px] font-bold text-slate-400">${new Date().toLocaleTimeString('pt-BR')}</span>
                    </div>
                    <p class="text-[9.5px] font-black text-slate-700 dark:text-slate-200 uppercase">${v.plate} - Conectado</p>
                `;
                if(eventFeed.children.length > 10) eventFeed.lastElementChild.remove();
                eventFeed.prepend(event);
            }
            v.was_online = v.is_online;
        });

        document.getElementById('btn-count-all').textContent = total;
        document.getElementById('btn-count-moving').textContent = moving;
        document.getElementById('btn-count-offline').textContent = offline;
    }

    function focusVehicle(id) {
        const v = vehiclesData.find(v => v.id === id);
        if (v && v.lat && v.lon) {
            map.flyTo([v.lat, v.lon], 16);
            if (markers[id]) markers[id].openPopup();
        }
    }

    function setFilter(f) {
        currentFilter = f;
        ['all', 'moving', 'offline'].forEach(i => {
            const btn = document.getElementById(`filter-${i}`);
            if(i === f) {
                btn.classList.add('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-500/20');
                btn.classList.remove('bg-slate-900/5', 'dark:bg-white/5', 'text-slate-500');
            } else {
                btn.classList.remove('bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-500/20');
                btn.classList.add('bg-slate-900/5', 'dark:bg-white/5', 'text-slate-500');
            }
        });
        renderVehicleList();
        updateMarkers();
    }

    function toggleControlPanel(show) {
        const hud = document.getElementById('control-hud');
        const expandBtn = document.getElementById('btn-expand-hud');
        if (show) {
            hud.classList.remove('collapsed', '-translate-x-[110%]');
            expandBtn.classList.add('hidden');
        } else {
            hud.classList.add('collapsed', '-translate-x-[110%]');
            setTimeout(() => {
                expandBtn.classList.remove('hidden');
            }, 300);
        }
    }

    function toggleEventFeed() {
        const container = document.getElementById('event-feed-container');
        const chevron = document.getElementById('event-chevron');
        if (container.classList.contains('max-h-0')) {
            container.classList.remove('max-h-0');
            container.classList.add('max-h-48');
            chevron.classList.add('rotate-180');
        } else {
            container.classList.remove('max-h-48');
            container.classList.add('max-h-0');
            chevron.classList.remove('rotate-180');
        }
    }

    function toggleAlertsPanel() {
        const alertsList = document.getElementById('alerts-list');
        const chevron = document.getElementById('alerts-chevron');
        const hud = document.getElementById('alerts-hud');
        
        if (alertsList.classList.contains('hidden')) {
            alertsList.classList.remove('hidden');
            chevron.classList.remove('rotate-180');
            hud.classList.remove('max-h-[50px]');
            hud.classList.add('max-h-56');
        } else {
            alertsList.classList.add('hidden');
            chevron.classList.add('rotate-180');
            hud.classList.remove('max-h-56');
            hud.classList.add('max-h-[50px]');
        }
    }

    document.getElementById('searchVehicle').addEventListener('input', renderVehicleList);
    window.onload = initMap;
</script>
{% endblock %}
